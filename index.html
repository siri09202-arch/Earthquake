<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震情報テキストジェネレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .shindo-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        /* 震度ごとのカラー設定 */
        .shindo-1 { background-color: #9ca3af; }
        .shindo-2 { background-color: #60a5fa; }
        .shindo-3 { background-color: #fbd38d; color: #744210; }
        .shindo-4 { background-color: #f6ad55; }
        .shindo-5- { background-color: #ed8936; }
        .shindo-5-plus { background-color: #dd6b20; }
        .shindo-6- { background-color: #e53e3e; }
        .shindo-6-plus { background-color: #c53030; }
        .shindo-7 { background-color: #742a2a; }
        
        .list-item-active {
            background-color: #e0f2fe;
            border-left: 4px solid #3b82f6;
        }
        
        /* Toast animation */
        @keyframes slideInUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 50;
            display: none;
            font-weight: bold;
        }
        .toast.show {
            display: block;
            animation: slideInUp 0.3s ease-out forwards;
        }
        .toast.hide {
            display: block;
            animation: fadeOut 0.3s ease-in forwards;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-blue-600 text-white p-4 shadow-md z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-earth-asia"></i>
            地震情報テキストジェネレーター
        </h1>
        <div class="flex items-center gap-2">
            <span id="data-status-badge" class="hidden bg-amber-500 text-white text-xs px-2 py-1 rounded-full font-bold flex items-center gap-1">
                <i class="fa-solid fa-triangle-exclamation"></i> デモデータ動作中
            </span>
            <button id="update-btn" onclick="fetchEarthquakeData()" class="bg-blue-700 hover:bg-blue-800 p-2 rounded-full transition-colors text-sm px-4 flex items-center gap-2 disabled:bg-gray-500 disabled:cursor-not-allowed">
                <i id="update-icon" class="fa-solid fa-rotate-right"></i> 更新
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <!-- 左側：履歴リスト -->
        <div class="w-full md:w-1/3 border-r border-gray-200 bg-white flex flex-col h-1/3 md:h-full">
            <div class="p-3 bg-gray-50 border-b border-gray-200 font-bold text-gray-700 text-sm flex justify-between items-center">
                <span>最新の地震履歴 (詳細情報のみ)</span>
            </div>
            <div id="earthquake-list" class="flex-1 overflow-y-auto">
                <div class="p-8 text-center text-gray-400">
                    <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>
                    データを取得中...
                </div>
            </div>
        </div>

        <!-- 右側：プレビュー＆コピー領域 -->
        <div class="w-full md:w-2/3 flex flex-col h-2/3 md:h-full bg-gray-50 relative">
            
            <div class="p-4 bg-white border-b border-gray-200 flex flex-wrap justify-between items-center shadow-sm z-10 gap-3">
                <div class="flex items-center gap-3">
                    <h2 class="font-bold text-gray-700 hidden md:block">生成テキスト</h2>
                    <select id="format-select" onchange="updateText()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-gray-700 cursor-pointer hover:bg-gray-100 transition-colors">
                        <optgroup label="通常バージョン（市区町村）">
                            <option value="standard">標準フォーマット</option>
                            <option value="discord" selected>Discord用</option>
                            <option value="twitter">X (Twitter)用</option>
                            <option value="line">LINE用</option>
                            <option value="instagram">Instagram用</option>
                            <option value="youtube">YouTubeコミュニティ投稿用</option>
                            <option value="nhk">NHKニュース風</option>
                            <option value="yahoo_weather">Yahoo!天気・災害風</option>
                            <option value="jma">気象庁風</option>
                            <option value="weathernews">ウェザーニュース風</option>
                            <option value="tenki">tenki.jp風</option>
                            <option value="jrisq">J-RISQ地震速報風</option>
                            <option value="yahoo_emergency">Yahoo!防災速報風</option>
                            <option value="p2p">P2P地震情報風</option>
                            <option value="nerv">特務機関NERV風</option>
                            <option value="jquake">JQuake風</option>
                            <option value="eqmonitor">EQMonitor風</option>
                            <option value="earthquickly">EarthQuickly 1号機風</option>
                            <option value="dpibot">DPI-Bot風</option>
                            <option value="simple">簡易フォーマット</option>
                            <option value="detail">詳細フォーマット</option>
                        </optgroup>
                        <optgroup label="観測点バージョン（詳細な地点）">
                            <option value="standard_obs">標準フォーマット（観測点バージョン）</option>
                            <option value="discord_obs">Discord用（観測点バージョン）</option>
                            <option value="twitter_obs">X (Twitter)用（観測点バージョン）</option>
                            <option value="line_obs">LINE用（観測点バージョン）</option>
                            <option value="instagram_obs">Instagram用（観測点バージョン）</option>
                            <option value="youtube_obs">YouTubeコミュニティ投稿用（観測点バージョン）</option>
                            <option value="nhk_obs">NHKニュース風（観測点バージョン）</option>
                            <option value="yahoo_weather_obs">Yahoo!天気・災害風（観測点バージョン）</option>
                            <option value="jma_obs">気象庁風（観測点バージョン）</option>
                            <option value="weathernews_obs">ウェザーニュース風（観測点バージョン）</option>
                            <option value="tenki_obs">tenki.jp風（観測点バージョン）</option>
                            <option value="jrisq_obs">J-RISQ地震速報風（観測点バージョン）</option>
                            <option value="yahoo_emergency_obs">Yahoo!防災速報風（観測点バージョン）</option>
                            <option value="p2p_obs">P2P地震情報風（観測点バージョン）</option>
                            <option value="nerv_obs">特務機関NERV風（観測点バージョン）</option>
                            <option value="jquake_obs">JQuake風（観測点バージョン）</option>
                            <option value="eqmonitor_obs">EQMonitor風（観測点バージョン）</option>
                            <option value="earthquickly_obs">EarthQuickly 1号機風（観測点バージョン）</option>
                            <option value="dpibot_obs">DPI-Bot風（観測点バージョン）</option>
                            <option value="simple_obs">簡易フォーマット（観測点バージョン）</option>
                            <option value="detail_obs">詳細フォーマット（観測点バージョン）</option>
                        </optgroup>
                    </select>
                </div>
                <button id="copy-btn" onclick="copyToClipboard()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold shadow transition-colors flex items-center gap-2 disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>
                    <i class="fa-regular fa-copy"></i>
                    コピーする
                </button>
            </div>

            <div class="flex-1 p-4 md:p-6 overflow-hidden">
                <textarea id="output-text" class="w-full h-full p-4 border border-gray-300 rounded-xl shadow-inner focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none font-mono text-sm md:text-base leading-relaxed bg-white" readonly placeholder="左側のリストから地震を選択してください..."></textarea>
            </div>
        </div>

    </main>

    <!-- トースト通知 -->
    <div id="toast" class="toast">
        <i class="fa-solid fa-check-circle mr-2"></i> コピーしました！
    </div>

    <script>
        // P2P地震情報APIのスケール（震度）マッピング
        const scaleMap = {
            10: { label: '1', class: 'shindo-1' },
            20: { label: '2', class: 'shindo-2' },
            30: { label: '3', class: 'shindo-3' },
            40: { label: '4', class: 'shindo-4' },
            45: { label: '5弱', class: 'shindo-5-' },
            50: { label: '5強', class: 'shindo-5-plus' },
            55: { label: '6弱', class: 'shindo-6-' },
            60: { label: '6強', class: 'shindo-6-plus' },
            70: { label: '7', class: 'shindo-7' }
        };

        // APIエラー時に使用するリアルなデモデータ
        const demoEarthquakes = [
            {
                "time": "2026/06/26 15:11:00",
                "issue": { "type": "DetailScale" },
                "earthquake": {
                    "time": "2026/06/26 15:11:00",
                    "hypocenter": {
                        "name": "岩手県沖",
                        "depth": 50,
                        "magnitude": 4.6,
                        "latitude": 40.3,
                        "longitude": 142.2
                    },
                    "maxScale": 30,
                    "domesticTsunami": "None"
                },
                "points": [
                    { "pref": "青森県", "addr": "八戸市湊町", "scale": 30 },
                    { "pref": "青森県", "addr": "階上町道仏", "scale": 30 },
                    { "pref": "岩手県", "addr": "軽米町軽米", "scale": 30 },
                    { "pref": "岩手県", "addr": "盛岡市藪川", "scale": 20 },
                    { "pref": "青森県", "addr": "三沢市桜町", "scale": 20 }
                ]
            },
            {
                "time": "2026/06/25 09:34:00",
                "issue": { "type": "DetailScale" },
                "earthquake": {
                    "time": "2026/06/25 09:34:00",
                    "hypocenter": {
                        "name": "千葉県東方沖",
                        "depth": 40,
                        "magnitude": 5.2,
                        "latitude": 35.6,
                        "longitude": 140.9
                    },
                    "maxScale": 40,
                    "domesticTsunami": "NonDestructive"
                },
                "points": [
                    { "pref": "千葉県", "addr": "銚子市川口町", "scale": 40 },
                    { "pref": "千葉県", "addr": "旭市南堀之内", "scale": 40 },
                    { "pref": "茨城県", "addr": "神栖市溝口", "scale": 30 },
                    { "pref": "東京都", "addr": "千代田区大手町", "scale": 20 }
                ]
            },
            {
                "time": "2026/06/24 23:45:00",
                "issue": { "type": "Foreign" },
                "earthquake": {
                    "time": "2026/06/24 23:45:00",
                    "hypocenter": {
                        "name": "南太平洋（ローヤルティ諸島南東方）",
                        "depth": 10,
                        "magnitude": 6.8,
                        "latitude": -22.3,
                        "longitude": 171.5
                    },
                    "maxScale": 0,
                    "domesticTsunami": "Checking"
                },
                "points": []
            }
        ];

        let currentEarthquakes = [];
        let currentSelectedEqIndex = -1;

        // P2P地震情報APIからデータを取得
        async function fetchEarthquakeData() {
            const listContainer = document.getElementById('earthquake-list');
            const updateBtn = document.getElementById('update-btn');
            const updateIcon = document.getElementById('update-icon');
            const statusBadge = document.getElementById('data-status-badge');

            // ボタンを無効化し、アイコンを回転させてローディング状態にする
            if (updateBtn && updateIcon) {
                updateBtn.disabled = true;
                updateIcon.classList.add('fa-spin');
            }

            listContainer.innerHTML = `
                <div class="p-8 text-center text-gray-400">
                    <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>
                    データを取得中...
                </div>
            `;
            document.getElementById('output-text').value = '';
            document.getElementById('copy-btn').disabled = true;

            try {
                // APIに予期せぬクエリパラメータが含まれていると400/403になる場合があるため、標準的なパスで取得
                const response = await fetch('https://api.p2pquake.net/v2/history?codes=551&limit=100');
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();

                // 「各地の震度に関する情報 (DetailScale)」 で最大震度3以上、または「遠地地震に関する情報 (Foreign)」を抽出
                currentEarthquakes = data.filter(eq => {
                    if (!eq.issue || !eq.earthquake) return false;
                    
                    // 国内地震（最大震度3以上）
                    if (eq.issue.type === 'DetailScale' && eq.points && eq.points.length > 0 && eq.earthquake.maxScale >= 30) {
                        return true;
                    }
                    
                    // 海外地震
                    if (eq.issue.type === 'Foreign') {
                        return true;
                    }
                    
                    return false;
                });

                if (statusBadge) statusBadge.classList.add('hidden'); // 正常に取得できたらバッジを隠す
                renderList();

            } catch (error) {
                console.warn("API取得エラーのため、デモデータにフォールバックします:", error);
                
                // APIエラー時はユーザーにデモデータであることを知らせ、フォールバックデータを代入
                currentEarthquakes = demoEarthquakes;
                if (statusBadge) statusBadge.classList.remove('hidden');
                
                renderList();
                
                // 簡易トーストで通知
                const toast = document.getElementById('toast');
                if (toast) {
                    const originalHtml = toast.innerHTML;
                    toast.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> APIエラーのためデモデータを表示しました`;
                    toast.style.backgroundColor = '#f59e0b'; // アンバー色
                    showToast();
                    setTimeout(() => {
                        toast.innerHTML = originalHtml;
                        toast.style.backgroundColor = '';
                    }, 3000);
                }
            } finally {
                // 取得完了後、ボタンの状態を元に戻す
                if (updateBtn && updateIcon) {
                    updateBtn.disabled = false;
                    updateIcon.classList.remove('fa-spin');
                }
            }
        }

        function renderList() {
            const listContainer = document.getElementById('earthquake-list');
            listContainer.innerHTML = '';

            if (currentEarthquakes.length === 0) {
                listContainer.innerHTML = `
                    <div class="p-8 text-center text-gray-500 text-sm">
                        対象の地震情報が見つかりませんでした。
                    </div>
                `;
                return;
            }

            currentEarthquakes.forEach((eq, index) => {
                const isForeign = eq.issue.type === 'Foreign';
                
                // バッジの表示設定（海外地震の場合は専用のデザインに）
                const maxScaleObj = isForeign 
                    ? { label: '遠地', class: 'bg-indigo-600', fontSize: '0.75rem' } 
                    : (scaleMap[eq.earthquake.maxScale] || { label: '不明', class: 'bg-gray-400', fontSize: '1.125rem' });

                const timeParts = eq.earthquake.time.split(' '); // [YYYY/MM/DD, HH:mm:ss]
                const dateText = timeParts[0];
                const timeText = timeParts[1].substring(0, 5); // HH:mm
                const name = eq.earthquake.hypocenter.name || '不明';

                const item = document.createElement('div');
                item.className = 'p-4 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition-colors flex items-center gap-3 list-item-elem';
                item.onclick = () => selectEarthquake(index, item);
                
                item.innerHTML = `
                    <div class="shindo-badge ${maxScaleObj.class} shadow-sm" style="font-size: ${maxScaleObj.fontSize || '1.125rem'};">
                        ${maxScaleObj.label}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-xs text-gray-500 mb-1">${dateText} ${timeText} 発生</div>
                        <div class="font-bold text-gray-800 truncate">${name}</div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                `;
                
                listContainer.appendChild(item);
            });
            
            // Auto select the first item
            if (currentEarthquakes.length > 0) {
                const firstItem = listContainer.querySelector('.list-item-elem');
                selectEarthquake(0, firstItem);
            }
        }

        function selectEarthquake(index, element) {
            currentSelectedEqIndex = index;
            // Highlight list item
            if (element) {
                document.querySelectorAll('.list-item-elem').forEach(el => {
                    el.classList.remove('list-item-active');
                });
                element.classList.add('list-item-active');
            }

            updateText();
        }

        function updateText() {
            if (currentSelectedEqIndex === -1) return;
            const eq = currentEarthquakes[currentSelectedEqIndex];
            const text = generateText(eq);
            
            document.getElementById('output-text').value = text;
            document.getElementById('copy-btn').disabled = false;
        }

        function generateText(eq) {
            const rawFormat = document.getElementById('format-select').value;
            const isObs = rawFormat.endsWith('_obs');
            const format = rawFormat.replace('_obs', '');
            
            const isForeign = eq.issue.type === 'Foreign';
            
            // 1. 日時のフォーマット
            const dateObj = new Date(eq.earthquake.time);
            const yyyy = dateObj.getFullYear();
            const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
            const dd = String(dateObj.getDate()).padStart(2, '0');
            const hh = String(dateObj.getHours()).padStart(2, '0');
            const min = String(dateObj.getMinutes()).padStart(2, '0');
            
            // ゼロ埋めなしバージョン（ニュース風等で利用）
            const M = String(dateObj.getMonth() + 1);
            const D = String(dateObj.getDate());
            const H = String(dateObj.getHours());
            
            const maxScaleStr = scaleMap[eq.earthquake.maxScale] ? scaleMap[eq.earthquake.maxScale].label : '不明';
            
            // 津波メッセージの設定
            let tsunamiText = "津波の影響は現在不明です。"; // デフォルト
            const dt = eq.earthquake.domesticTsunami;
            if (dt === "None") {
                tsunamiText = "この地震による津波の心配はありません。";
            } else if (dt === "NonDestructive") {
                tsunamiText = "この地震により、日本の沿岸では若干の海面変動があるかもしれませんが、被害の心配はありません。";
            } else if (dt === "Warning") {
                tsunamiText = "津波警報等（大津波警報・津波警報あるいは津波注意報）を発表中です。";
            } else if (dt === "Checking") {
                tsunamiText = "津波の影響は現在調査中です。";
            }
            
            const hypo = eq.earthquake.hypocenter;
            const hypoName = hypo.name || '不明';
            const magnitude = hypo.magnitude !== -1 ? hypo.magnitude.toFixed(1) : '不明';
            
            let depth = '不明';
            if (hypo.depth === 0) depth = 'ごく浅い';
            else if (hypo.depth > 0) depth = `${hypo.depth}km`;

            let lat = hypo.latitude !== -200 ? `北緯${hypo.latitude}度` : '不明';
            let lon = hypo.longitude !== -200 ? `東経${hypo.longitude}度` : '不明';

            // 2. 震度情報の集計（震度3:30 以上を抽出）
            const targetPoints = (eq.points || []).filter(p => p.scale >= 30);
            
            // 市区町村以降を切り捨てるための関数
            function formatCityName(addr) {
                const exceptions = [
                    "四日市市", "廿日市市", "野々市市", "八日市場市", 
                    "十日町市", "大町市", "町田市",
                    "東村山市", "武蔵村山市", "羽村市", "大村市", "田村市", "村上市", "村山市", "中村市", 
                    "村田町", "大町町", "市川三郷町", "市川町", "上市町", "市貝町", "下市町"
                ];
                for (const ex of exceptions) {
                    if (addr.startsWith(ex)) return ex;
                }
                const gunMatch = addr.match(/^(.+?郡.+?[町村])/);
                if (gunMatch) return gunMatch[1];
                const match = addr.match(/^(.+?[市区町村])/);
                if (match) return match[1];
                return addr;
            }

            const groupedByScale = {};
            targetPoints.forEach(p => {
                if (!groupedByScale[p.scale]) groupedByScale[p.scale] = {};
                if (!groupedByScale[p.scale][p.pref]) groupedByScale[p.scale][p.pref] = new Set();
                
                // 観測点バージョンの場合はフォーマット関数を通さず、そのままの観測点名を使用
                const formattedAddr = isObs ? p.addr : formatCityName(p.addr);
                groupedByScale[p.scale][p.pref].add(formattedAddr);
            });
            const sortedScales = Object.keys(groupedByScale).sort((a, b) => b - a);

            let resultText = "";

            // =============== フォーマット分岐 ===============
            
            if (format === 'discord') {
                resultText = isForeign ? `# 海外地震情報\n` : `# 地震情報\n`;
                if (isForeign) {
                    resultText += `${yyyy}年${mm}月${dd}日 ${hh}:${min}ごろ、海外で規模の大きな地震がありました。\n`;
                } else {
                    resultText += `${yyyy}年${mm}月${dd}日 ${hh}:${min}ごろ、最大震度${maxScaleStr}の地震がありました。\n`;
                }
                resultText += `${tsunamiText}\n`;
                resultText += `震源地: ${hypoName}\n`;
                resultText += `マグニチュード: ${magnitude}\n`;
                resultText += `深さ: ${depth}\n`;
                resultText += `緯度/経度: ${lat}/${lon}\n`;
                
                if (!isForeign) {
                    if (targetPoints.length === 0) {
                        resultText += `\n(震度3以上の観測データはありません)\n`;

                            resultText += `[${pref}] ${addrs}\n`;
                        });
                    });
                }
            }
            else if (format === 'detail') {
                resultText = `＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n`;
                resultText += isForeign ? `　　　海外地震情報\n` : `　　　　地 震 情 報\n`;
                resultText += `＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n`;
                resultText += `発生時刻: ${yyyy}年${mm}月${dd}日 ${hh}:${min}\n`;
                if (!isForeign) resultText += `最大震度: 震度${maxScaleStr}\n`;
                resultText += `震源地　: ${hypoName}\n`;
                resultText += `規模　　: マグニチュード ${magnitude}\n`;
                resultText += `深さ　　: ${depth}\n`;
                resultText += `位置　　: ${lat} / ${lon}\n`;
                resultText += `津波　　: ${tsunamiText}\n`;
                
                if (!isForeign) {
                    if (targetPoints.length === 0) {
                        resultText += `\n(震度3以上の観測データはありません)\n`;
                    } else {
                        resultText += `\n--------------------------------\n`;
                        resultText += `■ 各地の震度（震度3以上）\n`;
                        resultText += `--------------------------------\n`;
                        sortedScales.forEach(scale => {
                            const scaleStr = scaleMap[scale] ? scaleMap[scale].label : scale;
                            resultText += `【震度${scaleStr}】\n`;
                            const prefsObj = groupedByScale[scale];
                            Object.keys(prefsObj).forEach(pref => {
                                const addrs = Array.from(prefsObj[pref]).join('、');
                                resultText += `[${pref}]\n　${addrs}\n`;
                            });
                            resultText += `\n`;
                        });
                        resultText += `＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n`;
                    }
                } else {
                    resultText += `＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝\n`;
                }
            }

            return resultText;
        }

        async function copyToClipboard() {
            const text = document.getElementById('output-text').value;
            if (!text) return;

            try {
                // iframe内での制限を考慮し、execCommandをフォールバックとして常に使用する
                const textarea = document.getElementById('output-text');
                textarea.select();
                document.execCommand('copy');
                window.getSelection().removeAllRanges();
                showToast();
            } catch (err) {
                console.error('Failed to copy text: ', err);
                alert('コピーに失敗しました。');
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('hide');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
            }, 2000);
        }

        // 初期読み込み
        window.onload = fetchEarthquakeData;
    </script>
</body>
</html>
